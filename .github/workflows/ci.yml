name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint, Testes e Segurança
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: restaurante_test
          POSTGRES_PASSWORD: restaurante_test
          POSTGRES_DB: restaurante_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://restaurante_test:restaurante_test@localhost:5432/restaurante_test
      JWT_SECRET: ci-test-secret-with-at-least-32-characters
      CORS_ORIGIN: http://localhost:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependências
        working-directory: backend
        run: npm ci

      - name: Lint (ESLint)
        working-directory: backend
        run: npm run lint

      - name: Gerar cliente Prisma
        working-directory: backend
        run: npx prisma generate

      - name: Aplicar migrações no banco de teste
        working-directory: backend
        run: npx prisma db push

      - name: Verificar secrets hardcoded (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scanner de vulnerabilidades nas dependências (audit)
        working-directory: backend
        run: npm audit --audit-level=high

      - name: Rodar todos os testes
        working-directory: backend
        run: npm test

      - name: Relatório de cobertura
        working-directory: backend
        run: npm run test:coverage
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'

  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build imagem Docker
        working-directory: backend
        run: docker build -t restaurante-backend:${{ github.sha }} .

      - name: Testar imagem Docker
        run: |
          docker run --rm \
            -e NODE_ENV=production \
            -e DATABASE_URL=postgresql://test:test@localhost/test \
            -e JWT_SECRET=test-secret-for-image-validation-only \
            restaurante-backend:${{ github.sha }} \
            node -e "require('./dist/app')"
