version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: restaurante
      POSTGRES_PASSWORD: restaurante_dev
      POSTGRES_DB: restaurante
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U restaurante"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://restaurante:restaurante_dev@postgres:5432/restaurante

volumes:
  postgres_data:
